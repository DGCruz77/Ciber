<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Privado | Admin</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>SISTEMA DE ACESSO</h2>
            <input type="text" id="user-input" placeholder="USUÁRIO">
            <input type="password" id="pass-input" placeholder="SENHA">
            <button onclick="fazerLogin()">ACESSAR TERMINAL</button>
        </div>
    </div>

    <div id="chat-container" style="display: none;">
        <header class="header">
            <div id="user-info">STATUS: <span id="display-name">---</span> | ID: <span id="myId" style="color:var(--neon)">...</span></div>
            <button id="admin-btn" style="display:none;" onclick="abrirPainel()">PAINEL ADMIN</button>
        </header>

        <div class="conn-bar">
            <input type="text" id="peerId" placeholder="ID DO DESTINATÁRIO">
            <button onclick="connect()">CONECTAR</button>
        </div>

        <div id="chat"></div>

        <div class="input-area">
            <input type="text" id="msg" placeholder="Mensagem..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()">ENVIAR</button>
        </div>
    </div>

    <div id="painel-admin" style="display: none;">
        <div class="painel-header">
            <h2>MODO MONITORAMENTO (ADMIN)</h2>
            <button onclick="fecharPainel()" style="background:var(--red); color:white;">FECHAR</button>
        </div>
        
        <div class="admin-layout">
            <aside class="admin-sidebar">
                <h3>CONVERSAS</h3>
                <div id="lista-conversas">
                    </div>
                <button class="btn-danger" onclick="limparTudo()" style="margin-top: 20px;">APAGAR TUDO</button>
            </aside>
            
            <main class="admin-view">
                <h3>DETALHES DA CONVERSA: <span id="id-conversa-ativa">Nenhum</span></h3>
                <div id="logs-adm-detalhado">
                    </div>
            </main>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
