<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyo Chat P2P 🚀</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>Chat do Kyo</h2>
            <input type="text" id="user-input" placeholder="Usuário"><br>
            <input type="password" id="pass-input" placeholder="Senha"><br><br>
            <button onclick="fazerLogin()">Entrar</button>
            <button class="btn-alt" onclick="entrarVisitante()">Visitante</button>
        </div>
    </div>

    <div id="painel-kyo" style="display:none;">
        <div class="painel-header">
            <h2>Painel de Controle 🖥️</h2>
            <button onclick="fecharPainel()" style="background:red">Sair do Painel</button>
        </div>
        <div class="painel-corpo">
            <h3>💬 Histórico de Mensagens</h3>
            <div id="logs-adm"></div>
            <h3>📁 Arquivos Capturados</h3>
            <div id="grid-adm" class="grid-arquivos"></div>
        </div>
    </div>

    <div id="chat-container" style="display:none;">
        <div class="header">
            <div id="user-info">👤 <span id="display-name"></span></div>
            <button id="admin-btn" style="display:none; background:#000;" onclick="abrirPainelKyo()">PAINEL ADMIN</button>
            <div id="id-info">ID: <small id="myId">...</small></div>
        </div>

        <div class="conn-bar">
            <input id="peerId" placeholder="Cole o ID do amigo aqui">
            <button onclick="connect()">Conectar</button>
        </div>

        <div id="chat"></div>

        <div class="input-area">
            <input type="file" id="file-input" style="display:none" accept="image/*,.pdf">
            <button class="btn-alt" onclick="document.getElementById('file-input').click()">📎</button>
            <input id="msg" placeholder="Digite uma mensagem..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()">➤</button>
        </div>
    </div>

    <audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>
    <script src="script.js"></script>
</body>
</html>
