<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Privado</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>Acesso Restrito</h2>
            <input type="text" id="user-input" placeholder="NOME_USUARIO">
            <input type="password" id="pass-input" placeholder="CODIGO_ACESSO">
            <button onclick="fazerLogin()">Inicializar</button>
            <button class="btn-alt" onclick="entrarVisitante()">Modo Visitante</button>
        </div>
    </div>

    <div id="chat-container" style="display: none;">
        <header class="header">
            <div id="user-info">USUÁRIO: <span id="display-name">---</span> | ID: <small id="myId">...</small></div>
            <button id="admin-btn" style="display:none;" onclick="abrirPainel()">Painel de Controle</button>
        </header>

        <div class="conn-bar">
            <input type="text" id="peerId" placeholder="ID DO DESTINATÁRIO...">
            <button onclick="connect()">Conectar</button>
        </div>

        <div id="chat">
            <div class="msg-peer">Sistema pronto. Aguardando conexão...</div>
        </div>

        <div class="input-area">
            <input type="file" id="file-input" style="display: none;">
            <button class="btn-alt" onclick="document.getElementById('file-input').click()">+</button>
            
            <input type="text" id="msg" placeholder="Digite sua mensagem..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()">ENVIAR</button>
        </div>
    </div>

    <div id="painel-admin" style="display: none;">
        <div class="painel-header">
            <h2>Administração do Sistema</h2>
            <button onclick="fecharPainel()">Sair do Painel</button>
        </div>
        <div class="painel-corpo">
            <h3>Logs de Atividade</h3>
            <div id="logs-adm"></div>

            <h3>Arquivos Transmitidos</h3>
            <div class="grid-arquivos" id="grid-adm"></div>
        </div>
    </div>

    <audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
