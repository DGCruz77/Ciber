<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatPrivadoDG | P2P Brasileiro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

    <div id="login-screen">
        <div class="login-panel">
            <h1 class="brand-name">ChatDG 🇧🇷</h1>
            <p class="brand-tagline">Privacidade total. Sem intermediários.</p>
            
            <div id="box-principal">
                <div class="form-group">
                    <input type="text" id="user-input" placeholder="Seu usuário">
                </div>
                <div class="form-group">
                    <input type="password" id="pass-input" placeholder="Sua senha">
                </div>
                <button class="btn-login" onclick="fazerLogin()">ACESSAR CHAT</button>
                <button class="btn-text" onclick="mostrarFormVisitante()">Entrar como Visitante</button>
            </div>

            <div id="box-visitante" style="display:none;">
                <div class="form-group">
                    <input type="text" id="visitante-nome" placeholder="Nome de exibição">
                </div>
                <div class="form-group">
                    <input type="text" id="visitante-id" placeholder="ID (Ex: NEXO-01)">
                </div>
                <button class="btn-login" onclick="finalizarCadastroVisitante()">CRIAR ACESSO</button>
                <button class="btn-text" onclick="voltarLogin()">Voltar ao início</button>
            </div>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <nav class="side-nav">
            <div class="nav-logo">ChatPrivadoDG</div>
            <div class="user-badge">
                <span id="display-name">Carregando...</span>
                <small>ID: <b id="myId">---</b></small>
            </div>
            
            <div class="conn-area">
                <input type="text" id="peerId" placeholder="ID do amigo">
                <button onclick="conectar()" title="Conectar">Bora</button>
            </div>

            <div id="active-chats-list"></div>
            <button id="admin-btn" class="btn-login" style="display:none; margin-top: auto; background: var(--azul-br); border: 1px solid var(--amarelo-br);" onclick="abrirPainel()">PAINEL MONITOR</button>
        </nav>

        <main id="chat-desktop">
            <div id="welcome-screen" class="empty-state" style="padding: 100px; text-align: center; color: #999;">
                <h2>🇧🇷 Bem-vindo ao ChatDG</h2>
                <p>Conecte-se com alguém usando o ID ao lado.</p>
            </div>
            
            <div id="multi-chat-wrapper"></div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
