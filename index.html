<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatPrivadoDG | Conexão Humana</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

    <div id="login-screen">
        <div class="login-panel">
            <div class="login-card" id="box-principal">
                <h1 class="brand-name">ChatPrivadoDG</h1>
                <p class="brand-tagline">Conecte-se com segurança e privacidade.</p>
                
                <div class="form-group">
                    <input type="text" id="user-input" placeholder="Usuário">
                </div>
                <div class="form-group">
                    <input type="password" id="pass-input" placeholder="Senha">
                </div>

                <button class="btn-login" onclick="fazerLogin()">Entrar</button>
                <div class="divider"><span>ou</span></div>
                <button class="btn-text" onclick="mostrarFormVisitante()">Entrar como Visitante</button>
            </div>

            <div class="login-card" id="box-visitante" style="display:none;">
                <h2 class="brand-name">Visitante</h2>
                <div class="form-group">
                    <input type="text" id="visitante-nome" placeholder="Seu Nome">
                </div>
                <div class="form-group">
                    <input type="text" id="visitante-id" placeholder="ID Único (ex: USER-123)">
                </div>
                <button class="btn-login" onclick="finalizarCadastroVisitante()">Criar Identidade</button>
                <button class="btn-text" onclick="voltarLogin()">Voltar ao Login</button>
            </div>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <nav class="side-nav">
            <div class="nav-logo">DG</div>
            <div class="user-badge">
                <span id="display-name">Nome</span>
                <small id="myId">ID</small>
            </div>
            <hr>
            <div class="conn-area">
                <input type="text" id="peerId" placeholder="ID do Amigo">
                <button onclick="conectar()" title="Nova Conversa">+</button>
            </div>
            <div id="active-chats-list" class="chats-list"></div>
            <button id="admin-btn" class="btn-admin-nav" style="display:none;" onclick="abrirPainel()">Painel</button>
        </nav>

        <main id="chat-desktop">
            <div id="welcome-screen" class="empty-state">
                <div class="icon">✉️</div>
                <h2>Suas Mensagens</h2>
                <p>Envie fotos e mensagens privadas para um amigo.</p>
            </div>
            
            <div id="video-grid" style="display:none;">
                <video id="remote-video" autoplay playsinline></video>
                <button onclick="pararCompartilhamento()" class="btn-stop">Parar Transmissão</button>
            </div>

            <div id="multi-chat-wrapper"></div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
