<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Chat P2P do Kyo 🚀</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; }
        #chat { 
            border: 1px solid #ccc; height: 300px; overflow-y: auto; 
            padding: 10px; background: white; margin-bottom: 10px; border-radius: 5px;
        }
        .msg-me { color: green; margin: 5px 0; text-align: right; }
        .msg-peer { color: blue; margin: 5px 0; font-weight: bold; }
        .system { color: #888; font-style: italic; font-size: 0.8em; text-align: center; }
        input { padding: 8px; border-radius: 4px; border: 1px solid #ddd; }
        button { padding: 8px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>

    <h2>Kyo Chat P2P</h2>
    <p>Seu ID: <strong id="myId">Gerando...</strong></p>
    
    <input id="peerId" placeholder="ID do amigo">
    <button onclick="connect()">Conectar e Ativar Notificações</button>

    <div id="chat"></div>

    <input id="msg" placeholder="Mensagem..." style="width: 70%" onkeypress="if(event.key==='Enter') send()">
    <button onclick="send()">Enviar</button>

    <audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>

    <script>
        let peer = new Peer();
        let conn;

        // Log de mensagens no chat
        function log(msg, type = 'system') {
            const chat = document.getElementById("chat");
            chat.innerHTML += `<div class="${type}">${msg}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }

        // Quando o seu ID é gerado
        peer.on('open', id => {
            document.getElementById("myId").innerText = id;
            log("Sistema pronto. Compartilhe seu ID!");
        });

        // Quando ALGUÉM conecta em VOCÊ
        peer.on('connection', connection => {
            conn = connection;
            log("Alguém se conectou a você!");
            setup();
        });

        // Função para VOCÊ conectar em ALGUÉM
        async function connect() {
            // Tenta pedir permissão de notificação (opcional)
            if (window.Notification && Notification.permission !== 'granted') {
                await Notification.requestPermission();
            }

            const id = document.getElementById("peerId").value;
            if (!id) return alert("Digite o ID primeiro!");

            log("Tentando conectar...");
            conn = peer.connect(id);
            setup(); 
        }

        // Configura os eventos da conexão (receber dados, erro, etc)
        function setup() {
            if (!conn) return;

            conn.on('open', () => {
                log("Conectado com sucesso!", "system");
            });

            conn.on('data', data => {
                log("Amigo: " + data, "msg-peer");
                
                // Tocar som (precisa de um clique na página antes para o navegador deixar)
                const sound = document.getElementById("notifSound");
                sound.play().catch(e => console.log("Áudio bloqueado até interação."));

                // Notificação Desktop
                if (document.hidden && Notification.permission === 'granted') {
                    new Notification("Kyo Chat", { body: data });
                }
            });

            conn.on('error', err => {
                log("Erro na conexão: " + err, "system");
            });

            conn.on('close', () => {
                log("Conexão encerrada.", "system");
            });
        }

        // Enviar mensagem
        function send() {
            const input = document.getElementById("msg");
            const text = input.value;

            if (conn && conn.open) {
                conn.send(text);
                log("Você: " + text, "msg-me");
                input.value = "";
            } else {
                alert("Você não está conectado a ninguém!");
            }
        }
    </script>
</body>
</html>
