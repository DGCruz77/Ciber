<!DOCTYPE html>
<html>
    <head>
        <title>
            O kyo é o 01 da escola!
        </title>

        <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js">
        </script>

            <style>
                body
                {
                    font-family: Arial;
                    padding: 20px;
                }
                #chat
                {
                    border: 1px solid #ccc;
                    height: 200px;
                    overflow: auto;
                    padding: 10px;
                }
            </style>
    </head>
    <body>
        <h2>
            HASHTAG KYO SOU SEU FÃ
        </h2>
        <p>
            Seu ID: <span id = "myId"></span>
        </p>
        <input id="peerId" placeholder="ID do outro usuário">
        <button onclick="connect()">
            Conectar
        </button>
        <div id = "chat"></div>
        <input id="msg">
        <button onclick="send()">
            Enviar
        </button>

        <script>

            let peer = new Peer();
            let conn;

            function log (msg)
            {
                document.getElementById("chat").innerHTML += "<div>" + msg + "</div>";
            }
            peer.on('open', id =>
            {
                document.getElementById("myId").innerText = id;
            });

            peer.on('connection', connection =>
            {
                conn = connection;
                setup();
            });

            function connect()
            {
                const id = document.getElementById("peerId").value;
                conn = peer.connect(id);
                setup;
            }

            function setup()
            {
                conn.on('open', () => log("Conectado!!!"));
                conn.on('data', data => log("Boa tarde ao outro: " + data ));
            }

            function send()
            {
                const msg = document.getElementById("msg").value;
                conn.send(msg);
                log("Boa tarde de você: " + msg);

            }

        </script>
    </body>

</html>